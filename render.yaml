services:
  # ── Backend API (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: kiwasco-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kiwasco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend (React Static Site) ─────────────────────────────────────────
  - type: web
    name: kiwasco-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://kiwasco-api.onrender.com

# ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: kiwasco-db
    region: oregon
    plan: free
    databaseName: kiwasco_db
    user: kiwasco_user
